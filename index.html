<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Gestor de tareas personales">
  <meta name="author" content="Elizabeth Galarraga G.">
  <meta name="keywords" content="gestion, tiempo, tareas, inteligente">
  <title>TaskFlow: Gestor de tareas</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <!-- Bootstrap JS -->
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <!-- Mi JS : Importante type="module"-->
  <script defer type="module" src="./assets/js/script.js"></script>
</head>

<body>
  <header>
    <!-- <nav class="navbar bg-body-tertiary">
      <div class="container">
        <a class="navbar-brand" href="#">
          <img src="./assets/images/taskflow-logo.svg" alt="TaskFlow logo" width="100vh"> TaskFlow
        </a>
      </div>
    </nav> -->

    <!-- Arreglar APIs bar: Clima | Fecha & Hora | Dólar al cambio de hoy -->
    <div id="apis-bar"></div>
  </header>

  <main class="container my-4">

    <div id="alert-container"></div>

    <section class="mb-4">
      <!-- FORM para agregar tarea -->
      <form class="border rounded-3 p-4" id="task-form">
        <div class="mb-3">
          <label class="form-label" for="task-description">Descripción</label>
          <input type="text" class="form-control" id="task-description" name="task-description" placeholder="Ejemplo: Comprar pan" required>
        </div>
        <div class="mb-3">
          <label class="form-label" for="due-date">Fecha límite</label>
          <input type="datetime-local" class="form-control" id="due-date" name="due-date" required>
        </div>
        <button type="submit" class="btn btn-primary">Agregar tarea</button>
      </form>
    </section>

    <!-- Lista de Tareas agregadas dinámicamente -->
    <section class="mb-4">
      <h2>Tareas</h2>
      <ul class="list-group" id="tasks-list"></ul>
    </section>
  </main>

</body>

</html>
